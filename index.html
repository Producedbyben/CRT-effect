<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRT Effect Renderer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="controls">
        <h1>CRT Effect Renderer</h1>
        <label class="file-input">
          <span>Image source</span>
          <input id="imageInput" type="file" accept="image/*" />
        </label>

        <label>Preset
          <select id="presetSelect"></select>
        </label>

        <label>Scanline strength <input id="scanlineStrength" type="range" min="0" max="1" step="0.01" value="0.35" /></label>
        <label>Phosphor mask <input id="phosphorMask" type="range" min="0" max="1" step="0.01" value="0.4" /></label>
        <label>Barrel distortion <input id="barrelDistortion" type="range" min="0" max="0.8" step="0.01" value="0.08" /></label>
        <label>Bloom <input id="bloom" type="range" min="0" max="1" step="0.01" value="0.4" /></label>
        <label>Flicker <input id="flicker" type="range" min="0" max="1" step="0.01" value="0.24" /></label>
        <label>Chromatic aberration <input id="chromaticAberration" type="range" min="0" max="1" step="0.01" value="0.2" /></label>
        <label>Noise <input id="noise" type="range" min="0" max="1" step="0.01" value="0.3" /></label>

        <div class="row">
          <label>FPS <input id="fps" type="number" value="60" min="12" max="120" /></label>
          <label>Duration (s) <input id="duration" type="number" value="4" min="1" max="20" step="0.5" /></label>
        </div>

        <button id="exportBtn">Export MP4</button>
        <div id="status" class="status">Load an image to begin.</div>
        <progress id="progress" max="1" value="0"></progress>
      </section>

      <section class="preview">
        <canvas id="previewCanvas" width="960" height="540"></canvas>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
